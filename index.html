<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Astha Profile</title>

  <link rel="stylesheet"

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      min-height: 100vh;

      font-family: Arial, sans-serif;

      color: white;

      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
        url("rbrf1car.jpg");

      background-size: cover;
      background-position: center;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {

      width: 100%;
      max-width: 1100px;

      text-align: center;

      padding: 40px;
    }

    .profile {

      width: 130px;
      height: 130px;

      border-radius: 50%;

      object-fit: cover;

      border: 3px solid #1d78b5;

      box-shadow: 0 0 25px rgba(88,180,216,0.5);
    }

    h1 {
      margin-top: 14px;
      font-size: 52px;
    }

    .tagline {

      font-size: 14px;

      letter-spacing: 4px;

      color: #58b4d8;

      margin-top: 4px;
    }

    .desc {

      margin-top: 20px;

      max-width: 650px;
      margin-left: auto;
      margin-right: auto;

      padding: 18px;

      border-radius: 16px;

      background: rgba(10,20,35,0.55);

      backdrop-filter: blur(10px);

      font-size: 14px;

      line-height: 1.6;

      color: rgba(255,255,255,0.85);
    }

    .links {

      margin-top: 30px;

      display: grid;

      grid-template-columns: repeat(3, 1fr);

      gap: 14px;
    }

    .card {

      background: rgba(10,20,35,0.6);

      border-radius: 16px;

      padding: 14px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      text-decoration: none;

      color: white;

      transition: 0.2s;

    }

    .card:hover {

      transform: translateY(-3px);

      background: rgba(25,50,90,0.8);
    }

    .left {

      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {

      width: 42px;
      height: 42px;

      display: flex;
      justify-content: center;
      align-items: center;

      border-radius: 12px;

      background: rgba(255,255,255,0.06);
    }

    .title {

      font-size: 14px;
      font-weight: bold;
    }

    .subtitle {

      font-size: 11px;
      color: rgba(255,255,255,0.55);
    }

    @media (max-width: 900px) {
      .links {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .links {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 40px;
      }
    }

  </style>

</head>
